<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urlaubs-Kosten</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#007bff" />
    <style>
        
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌴 Urlaubs-Kosten</h1>
            <div class="subtitle">Alle Ausgaben im Blick</div>
        </div>

        <!-- Zusammenfassung -->
        <div class="summary">
            <div class="summary-item">
                <div class="label">Gesamt</div>
                <div class="value" id="totalAmount">0,00 €</div>
            </div>
            <div class="summary-item">
                <div class="label">50 % pro Person</div>
                <div class="value small" id="halfAmount">0,00 €</div>
            </div>
        </div>

        <!-- Formular für neue Ausgabe -->
        <div class="add-form">
            <input type="text" id="expenseName" placeholder="Name (z.B. Hotel)" required />
            <input type="number" id="expenseAmount" placeholder="Betrag (€)" step="0.01" min="0.01" required />
            <button onclick="addExpense()">+ Hinzu</button>
        </div>

        <!-- Einzelposten-Liste -->
        <div class="expense-list" id="expenseList">
            <div class="empty-state" id="emptyState">
                <div class="icon">📝</div>
                <div>Noch keine Ausgaben erfasst.</div>
                <div style="font-size:0.85rem">Füge deine erste Ausgabe hinzu!</div>
            </div>
        </div>

        <div class="footer">
            Alle Daten werden lokal auf deinem Handy gespeichert.
        </div>
    </div>

    <!-- Service Worker Registrierung -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registriert:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker Fehler:', error);
                    });
            });
        }
    </script>

    <!-- App-Logik -->
    <script src="script.js">
    </script>
</body>
</html>
